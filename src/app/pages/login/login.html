<div id="login-container">
    <h2>Login</h2>
    <section id="form-section">
        <form action="" id="login-form">
        <input type="email" name="username" pattern="^[A-Za-z0-9]+@[A-Za-z]+(\.[A-Za-z]+)+$" placeholder="Email" required autofocus>
        <input type="password" name="password" placeholder="Password" required>
        <div id="button-row">
            <input type="button" name="cancel" id="cancel-button" value="Cancel">
            <input type="submit" value="Log In">
        </div>
    </form>
    </section>
    <section id="external-providers-section">
        <div id="other-login">
            <img [src]="google_logo" alt="Google Logo">
            <img [src]="fb_logo" alt="">
            <img src="" alt="">
        </div>
    </section>
    
</div>
